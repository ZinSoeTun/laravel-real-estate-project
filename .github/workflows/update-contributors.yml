name: Update Contributors in README

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  contrib:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Contributors and Update README
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # GitHub API ကနေ contributor တွေရဲ့ username ကို ဆွဲထုတ်ခြင်း
          CONTRIBUTORS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/contributors" \
            | jq -r '.[] | "- [@" + .login + "](https://github/" + .login + ")"' | paste -sd "\n" -)

          # README.md ထဲက tag ကြားထဲကို အော်တို ထည့်ခြင်း
          sed -i '/<!-- readme-contributors - start -->/,/<!-- readme-contributors - end -->/{//!d;}' README.md
          sed -i '/<!-- readme-contributors - start -->/r '<(echo "$CONTRIBUTORS") README.md

          # ပြောင်းလဲသွားတဲ့ README ကို Repo ထဲ အော်တို Push ပြန်တင်ခြင်း
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          git diff-index --quiet HEAD || git commit -m "chore: update contributors list [skip ci]"
          git push
