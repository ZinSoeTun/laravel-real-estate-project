name: Update Contributors in README

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  contrib:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Contribute List
        uses: akhilm/contributors-readme-action@v2.3.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
