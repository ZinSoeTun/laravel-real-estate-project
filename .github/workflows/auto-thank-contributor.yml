name: Auto Thank Contributor

on:
  pull_request:
    types: [closed]

jobs:
  thank:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true && github.event.pull_request.user.login != 'dependabot[bot]'
    steps:
      - name: Comment Thank You
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: |
            Merged successfully! 🎉 Thank you so much for your awesome contribution, @${{ github.event.pull_request.user.login }}. 
            Really appreciate your help in making this project better! 🚀
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
